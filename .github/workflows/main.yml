name: Build Mac App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Mac
        run: npx electron-builder --mac --publish never

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jonah-Mac
          path: dist/*.dmg
